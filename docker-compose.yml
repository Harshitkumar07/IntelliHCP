version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: intellihcp_db
    environment:
      POSTGRES_USER: intellihcp
      POSTGRES_PASSWORD: intellihcp_secret
      POSTGRES_DB: intellihcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellihcp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
